<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Secure LAN File Sharing</title>
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .signup-card {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-field {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .signup-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transition: all 0.3s ease;
        }
        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 dark:from-gray-900 dark:to-gray-800 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full signup-card rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Create Account</h1>
            <p class="text-green-100">Join the secure file sharing network</p>
        </div>

        <form id="signupForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-white mb-2">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required
                    placeholder="Choose a username"
                    class="input-field w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none"
                >
            </div>

            <div>
                <label for="email" class="block text-sm font-semibold text-white mb-2">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    placeholder="your@email.com"
                    class="input-field w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-white mb-2">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required
                    placeholder="At least 6 characters"
                    minlength="6"
                    class="input-field w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none"
                >
                <p class="text-green-200 text-xs mt-1">Password must be at least 6 characters long</p>
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-semibold text-white mb-2">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    required
                    placeholder="Re-enter your password"
                    class="input-field w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none"
                >
            </div>

            <button 
                type="submit" 
                id="signup-btn"
                class="w-full signup-btn text-white font-bold py-3 px-6 rounded-lg transition duration-300"
            >
                Sign Up
            </button>
        </form>

        <div id="error-message" class="hidden mt-4 bg-red-500 text-white p-3 rounded-lg text-sm"></div>
        <div id="success-message" class="hidden mt-4 bg-green-500 text-white p-3 rounded-lg text-sm"></div>

        <div class="mt-6 text-center">
            <p class="text-green-200 text-sm">
                Already have an account? 
                <a href="login.html" class="text-white font-semibold hover:underline">Login here</a>
            </p>
        </div>

        <div class="text-center mt-6">
            <a href="index.html" class="inline-flex items-center text-green-200 hover:text-white transition duration-300">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Home
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'index.html';
                return;
            }

            const signupForm = document.getElementById('signupForm');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                errorMessage.classList.add('hidden');
                successMessage.classList.add('hidden');

                // Validate passwords match
                if (password !== confirmPassword) {
                    errorMessage.textContent = 'Passwords do not match!';
                    errorMessage.classList.remove('hidden');
                    return;
                }

                // Validate password length
                if (password.length < 6) {
                    errorMessage.textContent = 'Password must be at least 6 characters long!';
                    errorMessage.classList.remove('hidden');
                    return;
                }

                try {
                    const response = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        successMessage.textContent = data.message || 'Account created successfully! Redirecting to login...';
                        successMessage.classList.remove('hidden');
                        
                        // Clear form
                        signupForm.reset();
                        
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        errorMessage.textContent = data.message || 'Registration failed. Please try again.';
                        errorMessage.classList.remove('hidden');
                    }
                } catch (error) {
                    errorMessage.textContent = 'Network error. Please try again.';
                    errorMessage.classList.remove('hidden');
                }
            });
        });
    </script>
</body>
</html>
