<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File - Secure LAN File Sharing</title>
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .upload-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-bar {
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .file-input {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .file-input:hover {
            border-color: #4f46e5;
            background-color: #f8fafc;
        }
        .upload-btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: all 0.3s ease;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full upload-card rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Upload File</h1>
            <p class="text-blue-100">Securely share files on your LAN network</p>
        </div>
        <form id="uploadForm" enctype="multipart/form-data" class="space-y-6">
            <div>
                <label for="fileInput" class="block text-sm font-semibold text-white mb-3">Select File to Upload</label>
                <div class="file-input rounded-lg p-6 text-center cursor-pointer">
                    <input type="file" id="file-input" name="file" class="hidden" required>
                    <div class="text-gray-600 dark:text-gray-300">
                        <svg class="mx-auto h-12 w-12 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <p class="text-lg font-medium">Drop your file here or click to browse</p>
                        <p class="text-sm mt-1">Supports all file types</p>
                    </div>
                </div>
            </div>
            <button type="button" id="upload-btn" class="w-full upload-btn text-white font-bold py-3 px-6 rounded-lg transition duration-300">Upload File</button>
        </form>
        <div id="progress-container" class="mt-6 hidden">
            <div class="w-full bg-white/20 rounded-full h-3 overflow-hidden">
                <div id="progress-bar" class="progress-bar h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
            <p id="progressText" class="text-sm text-white mt-3 text-center animate-pulse">Uploading... Please wait</p>
        </div>
        <div id="message" class="mt-6">
            <!-- Success panel with CID display -->
            <div id="successPanel" class="hidden rounded-xl overflow-hidden shadow-lg">
                <div class="bg-green-500 text-white px-4 py-3 flex items-center gap-2">
                    <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                    </svg>
                    <span class="font-semibold">File uploaded successfully!</span>
                </div>
                <div class="bg-white/10 backdrop-blur-sm p-4">
                    <p class="text-white/80 text-xs font-semibold uppercase tracking-widest mb-2">IPFS Content Identifier (CID)</p>
                    <div class="flex items-center gap-2 bg-black/20 rounded-lg px-3 py-2">
                        <span class="text-xs font-mono text-green-300 font-bold break-all flex-1" id="cidDisplay">—</span>
                        <button id="copyCidBtn" title="Copy CID" class="flex-shrink-0 text-white/70 hover:text-white transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                            </svg>
                        </button>
                    </div>
                    <p id="copyConfirm" class="text-green-300 text-xs mt-2 hidden text-center">✓ Copied to clipboard!</p>
                </div>
            </div>

            <!-- Error message -->
            <div id="errorMessage" class="hidden bg-red-500 text-white p-3 rounded-lg">
                <svg class="inline w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
                <span id="errorText">Upload failed. Please try again.</span>
            </div>
        </div>
        <div class="text-center mt-6">
            <button onclick="window.location.href='index.html'" class="inline-flex items-center text-blue-200 hover:text-white transition duration-300">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Home
            </button>
        </div>
    </div>
    <script src="js/upload.js"></script>
</body>
</html>
