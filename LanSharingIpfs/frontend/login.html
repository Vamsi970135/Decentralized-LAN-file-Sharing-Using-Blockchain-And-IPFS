<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure LAN File Sharing</title>
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .login-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-field {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .login-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full login-card rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Welcome Back</h1>
            <p class="text-blue-100">Login to access your files</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-semibold text-white mb-2">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    placeholder="your@email.com"
                    class="input-field w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-white mb-2">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required
                    placeholder="Enter your password"
                    class="input-field w-full px-4 py-3 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none"
                >
            </div>

            <button 
                type="submit" 
                id="login-btn"
                class="w-full login-btn text-white font-bold py-3 px-6 rounded-lg transition duration-300"
            >
                Login
            </button>
        </form>

        <div id="error-message" class="hidden mt-4 bg-red-500 text-white p-3 rounded-lg text-sm"></div>
        <div id="success-message" class="hidden mt-4 bg-green-500 text-white p-3 rounded-lg text-sm"></div>

        <div class="mt-6 text-center">
            <p class="text-blue-200 text-sm">
                Don't have an account? 
                <a href="signup.html" class="text-white font-semibold hover:underline">Sign up here</a>
            </p>
        </div>

        <div class="text-center mt-6">
            <a href="index.html" class="inline-flex items-center text-blue-200 hover:text-white transition duration-300">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Home
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'index.html';
                return;
            }

            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                errorMessage.classList.add('hidden');
                successMessage.classList.add('hidden');

                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('token', data.token);
                        successMessage.textContent = 'Login successful! Redirecting...';
                        successMessage.classList.remove('hidden');
                        
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    } else {
                        errorMessage.textContent = data.message || 'Login failed. Please check your credentials.';
                        errorMessage.classList.remove('hidden');
                    }
                } catch (error) {
                    errorMessage.textContent = 'Network error. Please try again.';
                    errorMessage.classList.remove('hidden');
                }
            });
        });
    </script>
</body>
</html>
